<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} | Lobby Entry</title>
    <style>
        :root {
            --bg-base: #0f111a;
            --bg-surface: #161925;
            --bg-card: #1f2336;
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.3);
            --accent-pink: #ec4899;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-base);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- HEADER NAVBAR (Replaced Sidebar) --- */
        .top-navbar {
            width: 100%;
            background: var(--bg-surface);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .brand-logo {
            font-size: 1.25rem;
            font-weight: 800;
            background: linear-gradient(to right, #a855f7, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .nav-link {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            text-decoration: none;
            padding: 8px 14px;
            border-radius: 8px;
            font-weight: 500;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        .nav-link:hover { color: var(--text-main); background: rgba(255, 255, 255, 0.05); }

        /* --- STAGE ARCHITECTURE --- */
        .main-content {
            flex: 1;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .detail-panel {
            background: var(--bg-surface);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 24px;
            width: 100%;
            max-width: 680px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .detail-banner {
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4.5rem;
        }

        /* Pure CSS Banner Gradients mapping */
        .banner-math { background: linear-gradient(135deg, #1e1b4b, #311042); }
        .banner-truth { background: linear-gradient(135deg, #4c0519, #1c053a); }
        .banner-most { background: linear-gradient(135deg, #022c22, #064e3b); }
        .banner-default { background: linear-gradient(135deg, #062f4f, #0f172a); }

        .detail-body { padding: 40px; }
        .detail-body h1 { font-size: 2.2rem; font-weight: 800; margin-bottom: 6px; letter-spacing: -0.5px; }

        .engine-badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--accent-pink);
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            padding: 6px 12px;
            border-radius: 6px;
            margin-bottom: 24px;
            letter-spacing: 0.5px;
        }

        .detail-body p {
            color: var(--text-muted);
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 36px;
        }

        /* --- BUTTONS --- */
        .action-cluster {
            display: flex;
            gap: 12px;
        }

        .btn-launch, .btn-join, .btn-cancel {
            padding: 16px;
            border-radius: 12px;
            text-align: center;
            text-decoration: none;
            font-size: 1rem;
            transition: all 0.2s;
            border: none;
            cursor: pointer;
        }

        .btn-launch, .btn-join {
            flex: 1.5;
            color: white;
            font-weight: 700;
        }

        .btn-launch {
            background: var(--primary);
            box-shadow: 0 4px 14px var(--primary-glow);
        }
        .btn-launch:hover { background: #4f46e5; transform: translateY(-2px); }

        .btn-join {
            background: var(--accent-pink);
            box-shadow: 0 4px 14px rgba(236, 72, 153, 0.3);
        }
        .btn-join:hover { background: #db2777; transform: translateY(-2px); }

        .btn-cancel {
            flex: 1;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--text-main);
            font-weight: 600;
        }
        .btn-cancel:hover { background: rgba(255, 255, 255, 0.08); }


        /* --- RESPONSIVE MOBILE MEDIA QUERY --- */
        @media (max-width: 640px) {
            .top-navbar {
                padding: 12px 16px;
            }
            .brand-logo {
                font-size: 1.1rem;
            }
            .main-content {
                padding: 20px 12px;
                align-items: flex-start; /* Keeps element accessible if height is restrictive */
            }
            .detail-panel {
                border-radius: 16px;
            }
            .detail-banner {
                height: 130px;
                font-size: 3.5rem;
            }
            .detail-body {
                padding: 24px 20px;
            }
            .detail-body h1 {
                font-size: 1.75rem;
            }
            .detail-body p {
                font-size: 1rem;
                margin-bottom: 28px;
            }
            /* Stack buttons safely vertically on phones */
            .action-cluster {
                flex-direction: column;
                gap: 10px;
            }
            .btn-launch, .btn-join, .btn-cancel {
                flex: none;
                width: 100%;
                padding: 14px;
            }
            /* Reorder visually: Core actions up top, cancel/back at the bottom */
            .btn-launch { order: 1; }
            .btn-join { order: 2; }
            .btn-cancel { order: 3; }
        }
    </style>
</head>
<body>

    <!-- Dynamic Header Navbar replacing old sidebar -->
    <nav class="top-navbar">
        <div class="brand-logo">🕹️ PARTY CENTRAL</div>
        <a href="{% url 'dashboard' %}" class="nav-link">⬅️ Return</a>
    </nav>

    <main class="main-content">
        <article class="detail-panel">

            <div class="detail-banner {{ banner_class }}">
                {{ emoji }}
            </div>

            <div class="detail-body">
                <h1>{{ title }}</h1>
                <div class="engine-badge">📊 Loaded Dataset: {{ prompt_count }} Question Cards</div>

                <p>{{ description }}</p>

                <div class="action-cluster">
                    <a href="{% url 'dashboard' %}" class="btn-cancel">Go Back</a>
                    <a href="{% url 'join_room'%}" class="btn-join">Join Room 🔑</a>
                    <a href="{% url 'create_room' game_key %}" class="btn-launch">Create Room 🚀</a>
                </div>
            </div>
        </article>
    </main>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Room {{ room.name }}</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0d0d0d;
            color: white;
            margin: 0;
        }

        .header {
            background: #1f1f1f;
            padding: 15px;
            text-align: center;
            font-size: 20px;
        }

        .chat-box {
            width: 60%;
            margin: auto;
            margin-top: 20px;
            background: #1a1a1a;
            padding: 20px;
            border-radius: 10px;
            height: 400px;
            overflow-y: auto;
        }

        .message {
            background: #333;
            padding: 8px;
            margin: 5px 0;
            border-radius: 5px;
        }

        .input-box {
            width: 60%;
            margin: auto;
            display: flex;
            margin-top: 10px;
        }

        input {
            flex: 1;
            padding: 10px;
            border: none;
        }

        button {
            padding: 10px;
            background: #00c853;
            border: none;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #00e676;
        }
    </style>
</head>

<body>

<div class="header">
    🎲 Room: {{ room.name }}
</div>

<div class="chat-box" id="chat">
    <div class="message">Welcome to the room 👋</div>
</div>

<div class="input-box">
    <input type="text" id="msg" placeholder="Type message...">
    <button onclick="sendMessage()">Send</button>
</div>

<script>
const roomName = "{{ room.name }}";

const socket = new WebSocket(
    'ws://' + window.location.host + '/ws/game/' + roomName + '/'
);

socket.onmessage = function(e) {
    const data = JSON.parse(e.data);

    const chat = document.getElementById("chat");

    let div = document.createElement("div");
    div.className = "message";
    div.innerText = data.message;

    chat.appendChild(div);
};

function sendMessage() {
    let input = document.getElementById("msg");

    socket.send(JSON.stringify({
        'message': input.value
    }));

    input.value = "";
}
</script>

</body>
</html>

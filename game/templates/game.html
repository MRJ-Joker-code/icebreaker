 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MOST LIKELY TO</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bungee&family=Inter:wght@400;700;900&display=swap');

        :root {
            --accent: #2563eb;
            --accent-light: #38bdf8;
            --bg: #020617;
            --panel: #0f172a;
            --text: #f8fafc;
            --danger: #ef4444;
            --gold: #fbbf24;
        }

        * { box-sizing: border-box; }
        html, body {
            margin: 0; padding: 0; height: 100vh; width: 100vw;
            background: var(--bg); color: var(--text);
            font-family: 'Inter', sans-serif; overflow: hidden;
        }

        /* --- LAYOUT SHELL --- */
        .app-shell { display: flex; flex-direction: row; height: 100%; width: 100%; padding: 15px; gap: 15px; }
        .panel { background: var(--panel); border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); padding: 20px; display: flex; flex-direction: column; }
        .sidebar-scores { flex: 0 0 280px; }
        .sidebar-chat { flex: 0 0 400px; }
        .scroll-area { flex: 1; overflow-y: auto; margin-bottom: 10px; padding-right: 5px; }

        /* --- GAME CENTER --- */
        .game-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .main-card {
            background: var(--panel); width: 100%; max-width: 600px;
            border-radius: 24px; border: 4px solid var(--accent);
            padding: 40px; text-align: center; margin-bottom: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            transition: transform 0.3s ease;
        }

        .voting-grid { width: 100%; max-width: 650px; display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; }
        .vote-btn {
            background: rgba(255,255,255,0.03); border: 2px solid rgba(255,255,255,0.1);
            border-radius: 15px; padding: 18px; cursor: pointer; color: white;
            transition: all 0.2s ease; text-align: center; font-weight: 700;
        }
        .vote-btn:hover { border-color: var(--accent-light); transform: translateY(-2px); background: rgba(255,255,255,0.08); }
        .vote-btn.voted { border-color: var(--accent); background: rgba(37, 99, 235, 0.2); }

        /* --- OVERLAYS --- */
        .full-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            align-items: center; justify-content: center; z-index: 99999; backdrop-filter: blur(12px);
        }

        #game-ended-overlay { background: rgba(2, 6, 23, 0.98); }

        #round-winner-popup {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: var(--accent); padding: 40px 60px; border-radius: 30px;
            border: 6px solid white; text-align: center; z-index: 9000;
            box-shadow: 0 0 100px rgba(37, 99, 235, 0.6);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn { from { transform: translate(-50%, -50%) scale(0.5); opacity: 0; } to { transform: translate(-50%, -50%) scale(1); opacity: 1; } }

        /* --- BUTTONS --- */
        .btn-action { font-family: 'Bungee'; cursor: pointer; border-radius: 12px; text-align: center; width: 100%; border:none; padding: 14px; transition: 0.2s; }
        .btn-leave { background: transparent; color: #64748b; border: 1px solid #334155; font-size: 0.75rem; margin-top: 10px; }
        .btn-leave:hover { color: var(--danger); border-color: var(--danger); }
        .btn-next { background: var(--accent); color: white; font-size: 1.1rem; box-shadow: 0 5px 0 #1e3a8a; width: auto; padding: 15px 60px; margin-top: 25px; }
        .btn-next:active { transform: translateY(3px); box-shadow: none; }

        @media (max-width: 1024px) {
            html, body { overflow-y: auto; height: auto; }
            .app-shell { flex-direction: column; height: auto; }
            .sidebar-scores, .sidebar-chat, .game-area { width: 100%; min-height: 300px; }
        }
    </style>
</head>
<body>

    <!-- OVERLAY 1: GAME OVER -->
    <div id="game-ended-overlay" class="full-overlay">
        <div style="background: var(--panel); padding: 50px; border-radius: 32px; border: 3px solid var(--accent); text-align: center; max-width: 450px;">
            <h2 id="end-status-title" style="font-family:'Bungee'; color:var(--accent-light); margin:0 0 15px 0; font-size: 2.5rem;">GAME OVER</h2>
            <p id="end-status-msg" style="opacity:0.9; font-size: 1.1rem; line-height: 1.5;">The host has ended the session.<br>Calculating final scores...</p>
        </div>
    </div>

    <!-- OVERLAY 2: ROUND WINNER -->
    <div id="round-winner-popup">
        <h3 style="font-family:'Bungee'; margin:0; opacity:0.8; color: white; letter-spacing: 2px;">THE WINNER IS</h3>
        <h1 id="winner-name-text" style="font-family:'Bungee'; font-size: 4rem; margin:10px 0; color: white; text-shadow: 0 4px 10px rgba(0,0,0,0.3);">---</h1>
    </div>

    <div class="app-shell">
        <!-- SCOREBOARD -->
        <aside class="panel sidebar-scores">
            <div style="font-family:'Bungee'; color:var(--accent-light); margin-bottom: 15px; font-size: 0.8rem; letter-spacing: 1px;">LEADERBOARD</div>
            <div id="scoreboard-list" class="scroll-area"></div>
            <button class="btn-action btn-leave" onclick="handleExit()">
                {% if is_host %}END SESSION{% else %}LEAVE GAME{% endif %}
            </button>
        </aside>

        <!-- MAIN GAME -->
        <main class="game-area">
            <div class="main-card">
                <div id="prompt-display" style="font-weight:900; font-size: 2rem; line-height: 1.2;">
                    {{ room.last_action_text|default:"Waiting for host to start..." }}
                </div>
            </div>

            <div id="voting-container" class="voting-grid">
                {% for p in room.players.all %}
                <div class="vote-btn" id="btn-{{ p.user.username }}" onclick="castVote('{{ p.user.username }}')">
                    {{ p.user.username }}
                    <div id="vcount-{{ p.user.username }}" style="font-size:0.75rem; color:var(--accent-light); margin-top:6px; font-weight: 900;">0 votes</div>
                </div>
                {% endfor %}
            </div>

            {% if is_host %}
                <button class="btn-action btn-next" onclick="sendAction('next_turn')">NEXT ROUND</button>
            {% endif %}
        </main>

        <!-- CHAT -->
        <aside class="panel sidebar-chat">
            <div style="font-family:'Bungee'; color:var(--accent-light); margin-bottom: 10px; font-size: 0.8rem;">CHAT</div>
            <div id="chat-messages" class="scroll-area" style="font-size: 0.9rem;"></div>
            <div style="display:flex; gap:8px; background: rgba(0,0,0,0.2); padding: 8px; border-radius: 12px;">
                <input type="text" id="chatInput" style="flex:1; background:transparent; border:none; color:white; padding:8px;" placeholder="Type here..." onkeydown="if(event.key==='Enter') sendMessage()">
                <button onclick="sendMessage()" style="background:var(--accent); border:none; color:white; padding:0 20px; border-radius:8px; cursor:pointer; font-weight:bold;">SEND</button>
            </div>
        </aside>
    </div>

    <script>
        // --- CONFIG & STATE ---
        const IS_HOST = "{{ is_host }}" === "True";
        const ROOM_CODE = "{{ room.room_code }}";
        const RESULTS_URL = "/room/" + ROOM_CODE + "/results/";
        let lastCelebratedRound = "";

        // --- CORE ACTIONS ---
        async function sendAction(action, extraData = {}) {
            const fd = new FormData();
            fd.append('action', action);
            fd.append('csrfmiddlewaretoken', '{{ csrf_token }}');
            for (let key in extraData) fd.append(key, extraData[key]);

            try {
                await fetch(window.location.href, { method: 'POST', body: fd });
                syncGame();
            } catch (e) { console.error("Action Error:", e); }
        }

        async function castVote(target) {
            // Visual feedback
            document.querySelectorAll('.vote-btn').forEach(b => b.classList.remove('voted'));
            document.getElementById('btn-' + target).classList.add('voted');
            await sendAction('cast_vote', { 'target': target });
        }

        function handleExit() {
            if (IS_HOST) {
                if (confirm("End the game and view final results?")) window.location.href = "{% url 'end_game' room.room_code %}";
            } else {
                if (confirm("Leave current game?")) window.location.href = "{% url 'dashboard' %}";
            }
        }

        // --- SYNC ENGINE ---
        async function syncGame() {
            try {
                const res = await fetch("{% url 'get_room_status' room.room_code %}");

                if (res.status === 404) {
                    if (!IS_HOST) {
                        showGameOver("HOST LEFT", "The session has ended. Returning to dashboard...");
                        setTimeout(() => window.location.href = "{% url 'dashboard' %}", 3000);
                    }
                    return;
                }

                const data = await res.json();

                // 1. Check for Game Completion
                if (data.status === 'FINISHED' || data.is_finished === 'YES') {
                    if (!IS_HOST) {
                        showGameOver("GAME OVER", "The host ended the game. Viewing final results...");
                        setTimeout(() => window.location.href = RESULTS_URL, 3000);
                    } else {
                        window.location.href = RESULTS_URL;
                    }
                    return;
                }

                // 2. Check for Round Winner Animation
                if (data.last_winner && data.round_id !== lastCelebratedRound) {
                    triggerWinnerAnim(data.last_winner);
                    lastCelebratedRound = data.round_id;
                }

                // 3. Update UI Elements
                document.getElementById('prompt-display').innerText = data.prompt;

                // Update Vote Counts
                for (let [user, count] of Object.entries(data.scores || {})) {
                    const el = document.getElementById('vcount-' + user);
                    if (el) el.innerText = count + (count === 1 ? " vote" : " votes");
                }

                // Update Leaderboard
                if (data.total_scores) {
                    const sorted = Object.entries(data.total_scores).sort((a,b) => b[1]-a[1]);
                    document.getElementById('scoreboard-list').innerHTML = sorted.map(([u, s]) => `
                        <div style="display:flex; justify-content:space-between; padding:12px; background:rgba(255,255,255,0.05); border-radius:12px; margin-bottom:8px; border-left: 4px solid var(--accent);">
                            <span style="font-weight:700;">${u}</span>
                            <b style="color:var(--gold);">${s} Wins</b>
                        </div>
                    `).join('');
                }

                // Reset selection if new round
                if (data.has_voted === false) {
                    document.querySelectorAll('.vote-btn').forEach(b => b.classList.remove('voted'));
                }

            } catch (e) { console.error("Sync Failure:", e); }
        }

        // --- UI HELPERS ---
        function showGameOver(title, msg) {
            const overlay = document.getElementById('game-ended-overlay');
            document.getElementById('end-status-title').innerText = title;
            document.getElementById('end-status-msg').innerText = msg;
            overlay.style.display = 'flex';
        }

        function triggerWinnerAnim(name) {
            if (!name || name === "None") return;
            const pop = document.getElementById('round-winner-popup');
            document.getElementById('winner-name-text').innerText = name;
            pop.style.display = 'block';
            setTimeout(() => { pop.style.display = 'none'; }, 4000);
        }

        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const val = input.value.trim();
            if (!val) return;
            const fd = new FormData();
            fd.append('content', val);
            fd.append('csrfmiddlewaretoken', '{{ csrf_token }}');
            input.value = '';
            try {
                await fetch("{% url 'send_message' room.room_code %}", { method: 'POST', body: fd });
            } catch (e) {}
        }

        // --- INITIALIZE ---
        setInterval(syncGame, 2000);
        syncGame();
    </script>
</body>
</html>

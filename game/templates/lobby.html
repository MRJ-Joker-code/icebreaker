<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAME LOBBY | {{ room.room_code }}</title>
    <style>
        /* Modern Game Font */
        @import url('https://fonts.googleapis.com/css2?family=Bungee&family=Inter:wght@400;700&display=swap');

        body {
            margin: 0;
            padding: 0;
            background-color: #0f0c29; /* Deep Space Blue */
            font-family: 'Inter', sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .lobby-card {
            background: #1b1b2f;
            border: 4px solid green; /* Neon Pink Edge */
            border-radius: 20px;
            padding: 40px;
            width: 350px;
            text-align: center;
            box-shadow: 0 0 20px rgba(233, 69, 96, 0.4);
        }

        h1 {
            font-family: 'Bungee', cursive;
            color: green;
            font-size: 2.5rem;
            margin: 0 0 10px 0;
            letter-spacing: 2px;
        }

        .room-code {
            background: #16213e;
            padding: 10px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.2rem;
            color: #0f3460;
            color: #fff;
            margin-bottom: 30px;
            border: 1px dashed #e94560;
        }

        .player-list {
            text-align: left;
            margin: 20px 0;
            max-height: 200px;
            overflow-y: auto;
        }

        .player-row {
            background: #16213e;
            padding: 12px;
            margin: 8px 0;
            border-radius: 10px;
            display: flex;
            align-items: center;
            font-weight: bold;
        }

        .player-row::before {
            content: '👾';
            margin-right: 15px;
        }

        .start-btn {
            width: 100%;
            background: blue;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-family: 'Bungee', cursive;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 20px;
        }

        .start-btn:hover {
            background: green;
            transform: scale(1.03);
        }

        .waiting-text {
            color: #888;
            font-size: 0.9rem;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="lobby-card">
        <h1>LOBBY</h1>
        <div class="room-code">CODE: {{ room.room_code }}</div>

        <div class="player-list">
            {% for player in players %}
                <div class="player-row">{{ player.nickname }}</div>
            {% empty %}
                <div class="player-row">Searching for players...</div>
            {% endfor %}
        </div>

        {% if is_host %}
            <form action="{% url 'start_game' room.room_code %}" method="POST">
                {% csrf_token %}
                <button type="submit" class="start-btn">START GAME</button>
            </form>
        {% else %}
            <p class="waiting-text">Waiting for host to launch...</p>
        {% endif %}
    </div>

    <script>
        // Refresh every 3 seconds to check for new players or game start
        setInterval(() => { location.reload(); }, 3000);
    </script>
</body>
</html>
